<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="400" fill="#EA580C"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC2626;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:0.6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#gradient)"/>
  
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="40" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="320" cy="320" r="60" fill="#FFFFFF" opacity="0.1"/>
  <circle cx="350" cy="50" r="25" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- Main content area -->
  <rect x="40" y="40" width="320" height="320" rx="10" fill="#FFFFFF" opacity="0.95"/>
  
  <!-- Newsletter header -->
  <rect x="40" y="40" width="320" height="80" rx="10" fill="#EA580C"/>
  <text x="200" y="75" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    HERIZON
  </text>
  <text x="200" y="100" font-family="Arial, sans-serif" font-size="14" fill="#FFFFFF" text-anchor="middle">
    Women for Justice &amp; Equality
  </text>
  
  <!-- Newsletter content lines -->
  <rect x="60" y="140" width="280" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="160" width="240" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="180" width="260" height="8" rx="4" fill="#E5E7EB"/>
  
  <rect x="60" y="210" width="280" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="230" width="200" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="250" width="250" height="8" rx="4" fill="#E5E7EB"/>
  
  <rect x="60" y="280" width="270" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="300" width="220" height="8" rx="4" fill="#E5E7EB"/>
  <rect x="60" y="320" width="240" height="8" rx="4" fill="#E5E7EB"/>
  
  <!-- Quarter label -->
  <rect x="280" y="340" width="80" height="30" rx="15" fill="#059669"/>
  <text x="320" y="359" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#FFFFFF" text-anchor="middle">
    Q1 2026
  </text>
</svg>
